name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 2026년 환경에 맞춘 Node.js 24 강제 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read

    steps:
      # 1) 소스 코드 가져오기 (최신 v6 사용)
      - name: Checkout
        uses: actions/checkout@v6

      # 2) JDK 17 설정 (JAR 빌드를 위해 반드시 필요)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # 빌드 속도 최적화

      # 3) Gradle 빌드 (JAR 파일 생성)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test # 테스트 제외하고 빌드만 빠르게 진행

      # 4) AWS 자격 정보 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5) ECR 로그인
      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6) 이미지 태그 및 URI 준비
      - name: Prepare tags
        id: prep
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/codeit-repo" >> $GITHUB_ENV

      # 7) Docker 이미지 빌드 (위에서 만든 JAR를 사용)
      - name: Docker build
        run: |
          docker build -t "$REPO_URI:$IMAGE_TAG" -t "$REPO_URI:latest" .

      # 8) ECR로 푸시
      - name: Docker push
        run: |
          docker push "$REPO_URI:$IMAGE_TAG"
          docker push "$REPO_URI:latest"